#YAML
version: '3.8'

services:
  postgres:
    image: 'postgres:17-alpine'
    container_name: erp-postgres
    environment:
      - 'POSTGRES_DB=${POSTGRES_DB:-loop-erp}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}'
      - 'POSTGRES_USER=${POSTGRES_USER:-admin-user}'
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin-user -d loop-erp"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - loop-erp-network

  redis:
    image: 'redis:7-alpine'
    container_name: erp-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-test-password}"]
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-test-password}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - loop-erp-network

  zookeeper:
    image: 'confluentinc/cp-zookeeper:7.6.0'
    container_name: erp-zookeeper
    ports:
      - '2181:2181'
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SERVER_JVMFLAGS: "-Xmx256m -Xms128m"
    healthcheck:
      test: echo srvr | nc localhost 2181 || exit 1
      interval: 5s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384m
    networks:
      - loop-erp-network

  kafka:
    image: 'confluentinc/cp-kafka:7.6.0'
    container_name: erp-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://kafka:29092,INTERNAL://localhost:9092

      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768m
    networks:
      - loop-erp-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
      - KAFKA_CLUSTERS_0_ZOOKEEPER=zookeeper:2181
    networks:
      - loop-erp-network

  adminer:
    image: adminer
    container_name: erp-adminer
    ports:
      - "8081:8080"
    networks:
      - loop-erp-network

  prometheus:
    image: prom/prometheus:latest
    container_name: erp-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - loop-erp-network

  grafana:
    image: grafana/grafana:latest
    container_name: erp-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - loop-erp-network


  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Desabilitado para ambiente de desenvolvimento local
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
    deploy:
      resources:
        limits:
          memory: 768m
    networks:
      - loop-erp-network

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: logstash
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    ports:
      - "5000:5000/tcp" # Porta para receber logs dos microsserviços
      - "5000:5000/udp"
    environment:
      LS_JAVA_OPTS: "-Xmx256m -Xms256m"
    depends_on:
      - elasticsearch
    networks:
      - loop-erp-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - NODE_OPTIONS=--max-old-space-size=512
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    deploy:
      resources:
        limits:
          memory: 768m
    networks:
      - loop-erp-network

  sonarqube-db-init:
    image: postgres:17-alpine
    container_name: sonarqube-db-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    command: >
      sh -c "psql -h postgres -U $${POSTGRES_USER:-admin-user} -c \"SELECT 1\" -d sonarqube 2>/dev/null || psql -h postgres -U $${POSTGRES_USER:-admin-user} -c 'CREATE DATABASE sonarqube;'"
    networks:
      - loop-erp-network
    restart: "no"

  sonarqube:
    image: sonarqube:community
    container_name: erp-sonarqube
    depends_on:
      postgres:
        condition: service_healthy
      sonarqube-db-init:
        condition: service_completed_successfully
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonarqube
      SONAR_JDBC_USERNAME: ${POSTGRES_USER:-admin-user}
      SONAR_JDBC_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    deploy:
      resources:
        limits:
          memory: 1536m
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - loop-erp-network

  dind:
    image: docker:27-dind
    container_name: erp-dind
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=
    networks:
      - loop-erp-network

  jenkins:
    build:
      context: .
      dockerfile: jenkins.Dockerfile
    image: erp-jenkins-docker
    container_name: erp-jenkins
    privileged: true
    user: root
    ports:
      - "8082:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - maven_cache:/root/.m2
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - DOCKER_HOST=tcp://dind:2375
      - TESTCONTAINERS_HOST_OVERRIDE=dind
    depends_on:
      - dind
    networks:
      - loop-erp-network


volumes:
  pg_data:
  redis_data:
  kafka_data:
  prometheus_data:
  grafana_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  jenkins_home:
  maven_cache:

networks:
  loop-erp-network:
    driver: bridge