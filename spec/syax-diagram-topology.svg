<!-- Billing → Email -->
<path d="M465 290 L485 308" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

<!-- Billing → PostgreSQL -->
<path d="M360 438 L360 448 L207 448 L207 458" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

<!-- Billing → Redis -->
<line x1="387" y1="438" x2="387" y2="458" stroke="#A32D2D" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

<!-- Auth → PostgreSQL (main schema) -->
<path d="M310 95 L300 95 L300 448 L290 448 L290 484 L285 484" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4,3" opacity="0.5" marker-end="url(#arr)"/>
