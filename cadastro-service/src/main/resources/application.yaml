spring:
  application:
    name: cadastro-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/loop-erp
    password: ${DB_PASS}
    username: ${DB_USER}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:3}
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
# JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    web:
      pageable:
        max-page-size: 100

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS}

server:
  port: 8086
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized

  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: ${LOG_LEVEL:INFO}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

cep:
  service:
    url: ${CEP_SERVICE_URL:https://viacep.com.br/ws/}

---
# Profile de produção: desabilita a documentação OpenAPI/Swagger
spring:
  config:
    activate:
      on-profile: prod
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false