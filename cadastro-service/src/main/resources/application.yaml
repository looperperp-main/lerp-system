spring:
  application:
    name: cadastro-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/loop-erp
    password: ${DB_PASS}
    username: ${DB_USER}
    driver-class-name: org.postgresql.Driver
# JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    web:
      pageable:
        max-page-size: 100

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS}

server:
  port: 8086
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized

  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: ${LOG_LEVEL:INFO}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

cep:
  service:
    url: ${CEP_SERVICE_URL}