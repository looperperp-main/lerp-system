# Tabela Exemplo

databaseChangeLog:
  - changeSet:
      id: 001-create-roles-table
      author: erp-team
      changes:
        - createTable:
            tableName: roles
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(50)
                  constraints:
                    nullable: false
                    unique: true
        # Insere roles padrão iniciais
        - insert:
            tableName: roles
            columns:
              - column:
                  name: name
                  value: "ROLE_USER"
        - insert:
            tableName: roles
            columns:
              - column:
                  name: name
                  value: "ROLE_ADMIN"

        # Criação da tabela de usuários
        - changeSet:
            id: 002-create-users-table
            author: erp-team
            changes:
              - createTable:
                  tableName: users
                  columns:
                    - column:
                        name: id
                        type: bigint
                        autoIncrement: true
                        constraints:
                          primaryKey: true
                          nullable: false
                    - column:
                        name: username
                        type: varchar(50)
                        constraints:
                          nullable: false
                          unique: true
                    - column:
                        name: email
                        type: varchar(100)
                        constraints:
                          nullable: false
                          unique: true
                    - column:
                        name: password
                        type: varchar(255)
                        constraints:
                          nullable: false
                    - column:
                        name: active
                        type: boolean
                        defaultValueBoolean: true
                        constraints:
                          nullable: false
                    - column:
                        name: created_at
                        type: timestamp
                        defaultValueDate: CURRENT_TIMESTAMP

        # Tabela de associação Usuários <-> Roles (Muitos para Muitos)
        - changeSet:
            id: 003-create-user-roles-table
            author: erp-team
            changes:
              - createTable:
                  tableName: user_roles
                  columns:
                    - column:
                        name: user_id
                        type: bigint
                        constraints:
                          nullable: false
                          foreignKeyName: fk_user_roles_user_id
                          references: users(id)
                    - column:
                        name: role_id
                        type: bigint
                        constraints:
                          nullable: false
                          foreignKeyName: fk_user_roles_role_id
                          references: roles(id)
              # Adiciona chave primária composta para evitar duplicatas
              - addPrimaryKey:
                  tableName: user_roles
                  columnNames: user_id, role_id
                  constraintName: pk_user_roles