spring:
  application:
    name: billing-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/loop-erp
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:3}
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:test-password}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: billing-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

asaas:
  api-key: ${ASAAS_API_KEY:$aact_sandbox_key}
  base-url: ${ASAAS_BASE_URL:https://sandbox.asaas.com/api/v3}
  webhook-token: ${ASAAS_WEBHOOK_TOKEN:changeme-webhook-token}
  max-retry-attempts: ${ASAAS_MAX_RETRY_ATTEMPTS:3}

billing:
  redis:
    webhook-idempotency-ttl-seconds: 86400
    tenant-status-cache-ttl-seconds: 300
    annual-commission-guard-ttl-seconds: 31536000
  dunning:
    grace-period-days: 5
    cancel-after-days: 7
    reminder-before-days: 2
  cron:
    # D+1: 02:00 do dia 1 de cada mês — repasse das comissões PENDENTE do mês anterior (Fase 6, §10.1)
    commission-payout: ${BILLING_PAYOUT_CRON:0 0 2 1 * *}
    # Diário 02:30 — lembrete/suspensão/cancelamento por inadimplência (Fase 7, §27.7)
    dunning: ${BILLING_DUNNING_CRON:0 30 2 * * *}
    # A cada 15 min — reprocessa webhooks presos em RECEBIDO >10min (Fase 7)
    webhook-recovery: ${BILLING_WEBHOOK_RECOVERY_CRON:0 */15 * * * *}
    # A cada 30 min — ativa pagamentos confirmados no Asaas sem webhook (Fase 7)
    reconciliation: ${BILLING_RECONCILIATION_CRON:0 */30 * * * *}

logging:
  level:
    root: ${LOG_LEVEL:INFO}

server:
  port: 8088

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,metrics"
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

---
# Profile de produção: desabilita a documentação OpenAPI/Swagger
spring:
  config:
    activate:
      on-profile: prod
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false