<div class="page-wrapper">
  <!-- background glow -->
  <div class="glow-top-right"></div>

  <!-- logo -->
  <div class="logo-row">
    <div class="logo-icon">
      <span>✕</span>
    </div>
    <span class="logo-text">syax</span>
  </div>

  <!-- card -->
  <main class="card">
    <!-- badge -->
    <div class="badge">ÁREA DO CONTADOR</div>

    <h1 class="card-title">Acesse seu painel</h1>
    <p class="card-subtitle">Entre com suas credenciais de parceiro</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <!-- email -->
      <div class="field-group">
        <label class="field-label">E-mail</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor">
            <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
            <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
          </svg>
          <input
            type="email"
            formControlName="email"
            class="field-input"
            placeholder="contador@escritorio.com.br"
            autocomplete="email"
          />
          <div class="input-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <!-- password -->
      <div class="field-group">
        <div class="field-label-row">
          <label class="field-label">Senha</label>
          <a href="#" class="forgot-link">Esqueci minha senha</a>
        </div>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
          </svg>
          <input
            [type]="showPassword() ? 'text' : 'password'"
            formControlName="password"
            class="field-input"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <div class="input-right-actions">
            <div class="input-dots">
              <span></span><span></span><span></span>
            </div>
            <button type="button" class="eye-btn" (click)="togglePassword()">
              @if (showPassword()) {
                <svg viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.478 3 10 3a9.958 9.958 0 00-4.512 1.074l-1.78-1.781zm4.261 4.26l1.514 1.515a2.003 2.003 0 012.45 2.45l1.514 1.514a4 4 0 00-5.478-5.478z" clip-rule="evenodd"/>
                  <path d="M12.454 16.697L9.75 13.992a4 4 0 01-3.742-3.741L2.335 6.578A9.98 9.98 0 00.458 10c1.274 4.057 5.065 7 9.542 7 .847 0 1.669-.105 2.454-.303z"/>
                </svg>
              } @else {
                <svg viewBox="0 0 20 20" fill="currentColor">
                  <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/>
                  <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/>
                </svg>
              }
            </button>
          </div>
        </div>
      </div>

      @if (errorMessage()) {
        <p class="error-msg">{{ errorMessage() }}</p>
      }

      <!-- submit -->
      <button type="submit" class="submit-btn" [disabled]="loading()">
        @if (loading()) {
          Entrando...
        } @else {
          Entrar &nbsp;→
        }
      </button>
    </form>

    <div class="card-divider"></div>

    <p class="register-link">Ainda não é parceiro? <a href="#">Saiba mais →</a></p>
  </main>

  <!-- footer -->
  <footer class="page-footer">
    <p class="footer-top">© 2026 SYAX TECNOLOGIA · ÁREA EXCLUSIVA PARA CONTADORES CREDENCIADOS</p>
    <p class="footer-demo">demo: demo&#64;syax.com.br / parceiro123</p>
  </footer>
</div>
