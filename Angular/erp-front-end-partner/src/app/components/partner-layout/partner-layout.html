<app-cadastrar-cliente-modal></app-cadastrar-cliente-modal>

<div class="layout-root">

  <!-- Mobile overlay -->
  @if (isSidebarOpen()) {
    <div class="mobile-overlay" (click)="toggleSidebar()"></div>
  }

  <!-- ── Sidebar ── -->
  <aside class="sidebar" [class.sidebar--open]="isSidebarOpen()">

    <!-- Logo -->
    <div class="sidebar__logo">
      <div class="sidebar__logo-icon"><span>✕</span></div>
      <span class="sidebar__logo-text">syax</span>
    </div>

    <!-- Partner Info -->
    <div class="sidebar__partner">
      <span class="sidebar__partner-role">Contador parceiro</span>
      <span class="sidebar__partner-name">{{ partnerName() }}</span>
      <span class="sidebar__partner-code">{{ referralCode() }}</span>
    </div>

    <!-- Navigation -->
    <nav class="sidebar__nav">

      <a class="nav-item" routerLink="/dashboard" routerLinkActive="nav-item--active" [routerLinkActiveOptions]="{exact: true}">
        <svg class="nav-item__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>Dashboard</span>
      </a>

      <a class="nav-item" routerLink="/clientes" routerLinkActive="nav-item--active">
        <svg class="nav-item__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span>Meus Clientes</span>
        <span class="nav-badge">12</span>
      </a>

      <a class="nav-item" routerLink="/comissoes" routerLinkActive="nav-item--active">
        <svg class="nav-item__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
        <span>Comissões</span>
        <span class="nav-badge nav-badge--green">R$ 3.140</span>
      </a>

      <a class="nav-item" routerLink="/repasses" routerLinkActive="nav-item--active">
        <svg class="nav-item__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
        <span>Repasses</span>
      </a>

      <a class="nav-item" routerLink="/configuracoes" routerLinkActive="nav-item--active">
        <svg class="nav-item__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span>Configurações</span>
      </a>

    </nav>

    <!-- CTA -->
    <div class="sidebar__cta">
      <button class="cta-btn" (click)="cadastrarModal.open()">
        <svg class="cta-btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>
        </svg>
        Cadastrar Cliente
      </button>
    </div>

    <!-- Spacer -->
    <div class="sidebar__spacer"></div>

    <!-- Footer -->
    <div class="sidebar__footer">
      <a class="nav-item" routerLink="/configuracoes" routerLinkActive="nav-item--active">
        <svg class="nav-item__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
        </svg>
        <span>Configurações</span>
      </a>
    </div>
  </aside>

  <!-- ── Main Wrapper ── -->
  <div class="main-wrapper">

    <!-- Topbar -->
    <header class="topbar">

      <button class="topbar__menu-btn" (click)="toggleSidebar()" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <h1 class="topbar__title">{{ pageTitle() }}</h1>

      <div class="topbar__search">
        <svg class="topbar__search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input class="topbar__search-input" type="text" placeholder="Buscar cliente por nome ou CNPJ..." />
      </div>

      <div class="topbar__actions">
        <button class="topbar__notif-btn" aria-label="Notificações">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="notif-dot"></span>
        </button>

        <div class="topbar__user">
          <div class="user-avatar">{{ partnerInitials() }}</div>
          <span class="user-name">{{ partnerName() }}</span>
          <svg class="user-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>
    </header>

    <!-- Content -->
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>

</div>
