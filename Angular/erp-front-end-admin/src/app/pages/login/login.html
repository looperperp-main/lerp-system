<app-default-login-layout
  title="Acesse sua conta"
  primaryBtnText   = "Logar"
  secondaryBtnText = "Requisitar Acesso"
  (submit)="submit()"
  (navigate)="navigate()"
  [disablePrimaryBtn] = "!loginForm.valid"
>
  <form [formGroup] = "loginForm">
    <app-primary-input
      formControlName="email"
      inputName="email"
      type="email"
      label="E-mail"
      placeholder="johndoe@gmail.com"
    >
      <img ngSrc="svg/email-icon.svg" width="20" height="20"/>
    </app-primary-input>
    <app-primary-input
      inputName="password"
      formControlName="password"
      type="password"
      label="Sua Senha"
    >
      <img ngSrc="svg/password-icon.svg" width="20" height="20"/>
    </app-primary-input>
    <div class="form-actions-row">
      <label class="checkbox-container">
        <input type="checkbox" formControlName="rememberMe">
        <span>Lembrar-me</span>
      </label>
      <span class="forgot-password">Esqueceu sua senha?</span>
    </div>
  </form>
</app-default-login-layout>
