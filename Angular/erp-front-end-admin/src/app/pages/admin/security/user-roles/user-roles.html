<div class="page-container">
  <p-toast></p-toast>

  <div class="page-header">
    <div>
      <h1 class="page-title">Atribuir Acessos</h1>
      <p class="page-subtitle">Vincule Roles (Perfis) aos usuários do sistema</p>
    </div>
  </div>

  <div class="content-card mb-4 rounded-xl p-6 bg-white shadow-sm">
    <div class="content-toolbar flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
      <h3 class="content-toolbar-title text-xl font-bold text-gray-800 flex items-center gap-2 m-0">
        <i class="pi pi-search text-gray-700"></i> Busca
      </h3>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <!-- Tenant -->
      <div class="flex flex-col gap-2">
        <label for="tenantFilter" class="font-medium text-gray-700 text-sm">Tenant</label>
        <p-select
          id="tenantFilter"
          [options]="tenantsList()"
          [(ngModel)]="filters.tenantId"
          optionLabel="name"
          optionValue="id"
          [showClear]="true"
          placeholder="Selecione um Tenant"
          styleClass="w-full">
        </p-select>
      </div>

      <!-- Nome -->
      <div class="flex flex-col gap-2">
        <label for="nameFilter" class="font-medium text-gray-700 text-sm">Nome do Usuário</label>
        <input
          pInputText
          id="nameFilter"
          [(ngModel)]="filters.displayName"
          placeholder="Digite o nome"
          class="w-full" />
      </div>

      <!-- Email -->
      <div class="flex flex-col gap-2">
        <label for="emailFilter" class="font-medium text-gray-700 text-sm">Email</label>
        <input
          pInputText
          id="emailFilter"
          [(ngModel)]="filters.email"
          placeholder="Digite o email"
          class="w-full" />
      </div>
    </div>

    <div class="flex justify-end gap-2 mt-6">
      <app-primary-button
        label="Limpar"
        icon="pi pi-filter-slash"
        backgroundColor="#9ca3af"
        (onClick)="clearFilters()">
      </app-primary-button>
      <app-primary-button
        label="Buscar"
        icon="pi pi-search"
        (onClick)="applyFilters()">
      </app-primary-button>
    </div>
  </div>

  <div class="content-card">
    <div class="table-container mt-4">
      <p-table
        #dt
        [value]="users()"
        [columns]="cols"
        [loading]="loading()"
        [lazy]="true"
        (onLazyLoad)="onLazyLoad($event)"
        [totalRecords]="totalRecords()"
        [paginator]="true"
        [rows]="10"
        [tableStyle]="{ 'min-width': '50rem' }"
        styleClass="p-datatable-sm text-sm"
        dataKey="id">

        <ng-template pTemplate="header" let-columns>
          <tr>
            <th *ngFor="let col of columns" [pSortableColumn]="col.field !== 'actions' ? col.field : ''" class="text-xs uppercase text-gray-400 font-semibold border-b border-gray-100 pb-3">
              {{col.header}}<p-sortIcon *ngIf="col.field !== 'actions'" [field]="col.field"></p-sortIcon>
            </th>
          </tr>
        </ng-template>

        <ng-template pTemplate="body" let-rowData let-columns="columns">
          <tr class="hover:bg-gray-50 border-b border-gray-50 last:border-0 transition-colors">
            <td *ngFor="let col of columns" class="py-3 text-gray-600">

              <ng-container *ngIf="col.type === 'text'">
                <span class="font-medium" [class.text-indigo-700]="col.field === 'displayName'">
                   {{ rowData[col.field] }}
                </span>
              </ng-container>

              <ng-container *ngIf="col.type === 'actions'">
                <button
                  pButton
                  pRipple
                  icon="pi pi-key"
                  label="Atribuir Acessos"
                  class="p-button-outlined p-button-info p-button-sm rounded-lg"
                  (click)="openConfig(rowData)">
                </button>
              </ng-container>

            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </div>

  <app-user-role-form
    *ngIf="selectedUser"
    [(visible)]="dialogVisible"
    [user]="selectedUser">
  </app-user-role-form>

</div>
