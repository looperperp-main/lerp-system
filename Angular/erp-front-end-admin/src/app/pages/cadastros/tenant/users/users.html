<div class="page-container" xmlns="http://www.w3.org/1999/html">
  <p-toast></p-toast>

  <!-- Header Section -->
  <div class="page-header">
    <div>
      <h1 class="page-title">Gerenciamento de Usuários</h1>
      <p class="page-subtitle">Crie e gerencie os usuários do sistema</p>
    </div>
  </div>
  <div class="content-card rounded-xl p-6 bg-white shadow-sm mt-4">
    <div class="content-toolbar flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
      <h3 class="content-toolbar-title text-xl font-bold text-gray-800 flex items-center gap-2 m-0">
        <i class="pi pi-arrow-circle-right text-gray-700"></i> Busca
      </h3>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <!-- Tenant -->
      <div class="flex flex-col gap-2">
        <label for="tenantFilter" class="font-medium text-gray-700 text-sm">Tenant</label>
        <p-select
          id="tenantFilter"
          [options]="tenantsList()"
          [(ngModel)]="filters.tenantId"
          optionLabel="name"
          optionValue="id"
          [showClear]="true"
          placeholder="Selecione um Tenant"
          styleClass="w-full">
        </p-select>
      </div>

      <!-- Nome -->
      <div class="flex flex-col gap-2">
        <label for="nameFilter" class="font-medium text-gray-700 text-sm">Nome do Usuário</label>
        <input
          pInputText
          id="nameFilter"
          [(ngModel)]="filters.displayName"
          placeholder="Digite o nome"
          class="w-full" />
      </div>

      <!-- Status -->
      <div class="flex flex-col gap-2">
        <label for="statusFilter" class="font-medium text-gray-700 text-sm">Status</label>
        <p-select
          id="statusFilter"
          [options]="statusOptions"
          [(ngModel)]="filters.active"
          optionLabel="label"
          optionValue="value"
          [showClear]="true"
          placeholder="Selecione o Status"
          styleClass="w-full">
        </p-select>
      </div>
    </div>

    <div class="flex justify-end gap-2 mt-6">
      <app-primary-button
        label="Limpar"
        icon="pi pi-filter-slash"
        backgroundColor="#9ca3af"
        (onClick)="clearFilters()">
      </app-primary-button>
      <app-primary-button
        label="Buscar"
        icon="pi pi-search"
        (onClick)="applyFilters()">
      </app-primary-button>
    </div>
  </div>
  <br>
  <div class="content-card rounded-xl p-6 bg-white shadow-sm mt-4">
    <div class="content-toolbar flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
      <!-- Título de Ações -->
      <h3 class="content-toolbar-title text-xl font-bold text-gray-800 flex items-center gap-2 m-0">
        <i class="pi pi-arrow-circle-right text-gray-700"></i> Ações
      </h3>
      <div class="content-toolbar-actions">
        <app-primary-button
          label="Novo Usuário"
          icon="pi pi-user-plus"
          (onClick)="openNew()">
        </app-primary-button>
        <app-primary-button
          icon="pi pi-upload"
          padding="0.5rem 0.8rem"
          tooltip="Exportar"
          tooltipPosition="bottom"
          backgroundColor="#f28705"
          (onClick)="exportData()">
        </app-primary-button>
      </div>
    </div>

    <div class="table-container">
      <p-table
        #dt
        [value]="users()"
        [columns]="cols"
        [loading]="loading()"
        [lazy]="true"
        (onLazyLoad)="onLazyLoad($event)"
        [totalRecords]="totalRecords()"
        [paginator]="true"
        [rows]="10"
        [showCurrentPageReport]="true"
        currentPageReportTemplate="Mostrando {first} até {last} de {totalRecords} registros"
        [rowsPerPageOptions]="[10, 25, 50]"
        [tableStyle]="{ 'min-width': '60rem' }"
        styleClass="p-datatable-sm text-sm"
        [paginatorDropdownAppendTo]="'body'"
        dataKey="id">

        <!-- Cabeçalho da Tabela -->
        <ng-template pTemplate="header" let-columns>
          <tr>
            <th *ngFor="let col of columns" [pSortableColumn]="col.field !== 'actions' ? col.field : ''" class="text-xs uppercase text-gray-400 font-semibold border-b border-gray-100 pb-3">
              {{col.header}} <p-sortIcon *ngIf="col.field !== 'actions'" [field]="col.field"></p-sortIcon>
            </th>
          </tr>
        </ng-template>

        <!-- Corpo da Tabela -->
        <ng-template pTemplate="body" let-rowData let-columns="columns">
          <tr class="hover:bg-gray-50 border-b border-gray-50 last:border-0 transition-colors">
            <td *ngFor="let col of columns" class="py-3 text-gray-600">

              <ng-container *ngIf="col.type === 'status'">
                                <span [class]="'px-2 py-1 rounded text-xs font-medium ' +
                                    (rowData.active === true ? 'bg-green-100 text-green-700' :
                                     rowData.active === false ? 'bg-orange-100 text-orange-700' :
                                     'bg-red-100 text-red-700')">
                                    {{rowData.active === true ? 'ATIVO' : 'INATIVO'}}
                                </span>
              </ng-container>

              <!-- Colunas de Data Customizadas -->
              <ng-container *ngIf="col.type === 'date'">
                {{rowData[col.field] | date:'dd/MM/yyyy HH:mm'}}
              </ng-container>

              <!-- Coluna de Ações -->
              <ng-container *ngIf="col.type === 'actions'">
                <div class="flex gap-2">
                  <button
                    pButton
                    pRipple
                    icon="pi pi-pencil"
                    class="p-button-rounded p-button-text p-button-info p-button-sm w-8 h-8"
                    style="color: #F24405;"
                    pTooltip="Editar"
                    (click)="editUser(rowData)"
                    tooltipPosition="top">
                  </button>

                  <!-- Botão Habilitar/Desabilitar -->
                  <button
                    pButton
                    pRipple
                    [icon]="rowData.active === true ? 'pi pi-ban' : 'pi pi-check-circle'"
                    [class]="'p-button-rounded p-button-text p-button-sm w-8 h-8 ' + (rowData.status === 'ATIVO' ? 'p-button-warning' : 'p-button-success')"
                    [style]="rowData.active === true ? 'color: #F24405; background-color: rgba(242, 68, 5, 0.15); border: none' : 'color: #22c55e; background-color: rgba(34, 197, 94, 0.15); border: none'"
                    pTooltip="Alterar Status"
                    (click)="updateStatus(rowData.id)"
                    tooltipPosition="top"
                  >
                  </button>
                </div>
              </ng-container>

              <!-- Dados em Texto Normal -->
              <ng-container *ngIf="col.type === 'text'">
                <span class="font-medium" [class.text-gray-900]="col.field === 'name'">
                  <!-- Se o campo for CNPJ, aplica o pipe. Caso contrário, mostra o texto normal -->
                  <ng-container *ngIf="col.field === 'cnpj'; else normalText">
                      {{ rowData[col.field] | cnpj }}
                  </ng-container>

                  <!-- Para texto normal, aplica o decodificador de HTML -->
                  <ng-template #normalText>
                      {{ rowData[col.field] | htmlDecode }}
                  </ng-template>
                </span>
              </ng-container>
            </td>
          </tr>
        </ng-template>

        <!-- Estado Vazio -->
        <ng-template pTemplate="emptymessage">
          <tr>
            <td [attr.colspan]="cols.length" class="text-center py-6 text-gray-500">
              Nenhum User encontrado.
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </div>

  <app-user-form
    [(visible)]="userDialogVisible"
    [user]="userToSave"
    [tenants]="tenantsList()"
    (save)="saveUser($event)">
  </app-user-form>
</div>
