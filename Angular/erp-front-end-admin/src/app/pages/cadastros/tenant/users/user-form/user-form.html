<p-dialog
  [(visible)]="visible"
  (onHide)="hideDialog()"
  [style]="{width: '450px'}"
  [header]="user.id ? 'Editar Usuário' : 'Novo Usuário'"
  [modal]="true">

  <div class="flex flex-col gap-4 pt-2">
    <div class="field">
      <label for="displayName" class="block text-sm font-medium text-gray-700 mb-1">Nome de Exibição <span class="text-red-500">*</span></label>
      <input type="text" pInputText id="displayName" [(ngModel)]="user.displayName" autofocus
             class="form-input"
             [ngClass]="{'border-red-500': submitted && !user.displayName}" />
      <small class="text-red-500 text-xs mt-1 block" *ngIf="submitted && !user.displayName">O nome é obrigatório.</small>
    </div>

    <div class="field">
      <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-mail <span class="text-red-500">*</span></label>
      <input type="email" pInputText id="email" [(ngModel)]="user.email"
             class="form-input"
             [disabled]="!!user.id"
             [ngClass]="{'border-red-500': submitted && !user.email, 'bg-gray-100': !!user.id}" />
      <small class="text-red-500 text-xs mt-1 block" *ngIf="submitted && !user.email">O e-mail é obrigatório.</small>
    </div>

    <div class="field">
      <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
        Senha <span class="text-red-500" *ngIf="!user.id">*</span>
        <span class="text-gray-400 font-normal text-xs ml-2" *ngIf="user.id">(Deixe em branco para não alterar)</span>
      </label>
      <p-password
        id="password"
        [(ngModel)]="user.passwordHash"
        [toggleMask]="true"
        styleClass="w-full"
        inputStyleClass="form-input w-full"
        [feedback]="true"
        promptLabel="Digite uma senha forte"
        weakLabel="Fraca"
        mediumLabel="Razoável"
        strongLabel="Forte"
        [appendTo]="'body'"
        [ngClass]="{'ng-invalid ng-dirty': submitted && !isPasswordValid()}">
        <ng-template pTemplate="footer">
          <p class="mt-2 text-xs font-semibold text-gray-700 mb-2">Requisitos da senha:</p>
          <ul class="text-xs space-y-1">
            <li class="flex items-center gap-2" [ngClass]="hasMinLength() ? 'text-green-600' : 'text-gray-400'">
              <i [class]="hasMinLength() ? 'pi pi-check-circle' : 'pi pi-circle'"></i>
              Pelo menos 14 caracteres
            </li>
            <li class="flex items-center gap-2" [ngClass]="hasUpperCase() && hasLowerCase() ? 'text-green-600' : 'text-gray-400'">
              <i [class]="hasUpperCase() && hasLowerCase() ? 'pi pi-check-circle' : 'pi pi-circle'"></i>
              Letras maiúsculas e minúsculas
            </li>
            <li class="flex items-center gap-2" [ngClass]="hasNumber() ? 'text-green-600' : 'text-gray-400'">
              <i [class]="hasNumber() ? 'pi pi-check-circle' : 'pi pi-circle'"></i>
              Pelo menos 1 número
            </li>
            <li class="flex items-center gap-2" [ngClass]="hasSpecialChar() ? 'text-green-600' : 'text-gray-400'">
              <i [class]="hasSpecialChar() ? 'pi pi-check-circle' : 'pi pi-circle'"></i>
              Símbolos (ex: ! &#64; # $)
            </li>
          </ul>
        </ng-template>
      </p-password>
      <small class="text-red-500 text-xs mt-1 block" *ngIf="submitted && !user.id && !user.passwordHash">A senha é obrigatória.</small>
      <small class="text-red-500 text-xs mt-1 block" *ngIf="submitted && user.passwordHash && !isPasswordValid()">A senha não atende aos requisitos de complexidade.</small>
    </div>

    <div class="field">
      <label for="tenantId" class="block text-sm font-medium text-gray-700 mb-1">Vincular a um Tenant <span class="text-red-500">*</span></label>
      <!-- Trocado o input number por p-select -->
      <p-select
        id="tenantId"
        [options]="tenants"
        [(ngModel)]="user.tenantId"
        optionLabel="name"
        optionValue="id"
        [dataKey]="'id'"
        placeholder="Selecione um Tenant"
        [filter]="true"
        [appendTo]="'body'"
        filterBy="name,cnpj"
        styleClass="w-full border-gray-300 rounded-md shadow-sm focus:ring-orange-500 focus:border-orange-500 bg-white"
        [ngClass]="{'ng-invalid ng-dirty': submitted && !user.tenantId}">
      </p-select>
      <small class="text-red-500 text-xs mt-1 block" *ngIf="submitted && !user.tenantId">A seleção de um Tenant é obrigatória.</small>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <button pButton pRipple label="Cancelar" icon="pi pi-times" class="p-button-text text-gray-600 hover:bg-gray-100" (click)="hideDialog()"></button>
    <button pButton pRipple label="Salvar" icon="pi pi-check" style="background-color: #f04e1a; color: white; border: none;" (click)="onSave()"></button>
  </ng-template>
</p-dialog>
