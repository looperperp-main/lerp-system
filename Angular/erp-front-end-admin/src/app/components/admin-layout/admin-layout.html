<div class="layout-wrapper" [class.layout-static-inactive]="isCollapsed">

  <!-- Topbar -->
  <div class="layout-topbar">

    <!-- 1. Botão do Menu (Agora é o primeiro item) -->
    <button class="p-link layout-menu-button layout-topbar-button" (click)="toggleSidebar()">
      <i class="pi pi-bars"></i>
    </button>

    <!-- 2. Logo (Agora vem depois do botão) -->
    <a class="layout-topbar-logo" routerLink="/">
      <div class="brand__icon">⚡</div>
      <span>ERP VSD</span>
    </a>

    <button class="p-link layout-topbar-menu-button layout-topbar-button" (click)="toggleDropdown()">
      <i class="pi pi-ellipsis-v"></i>
    </button>

    <div class="layout-topbar-menu" [class.layout-topbar-menu-mobile-active]="isDropdownOpen">
      <button class="p-link layout-topbar-button">
        <i class="pi pi-calendar"></i>
        <span>Calendar</span>
      </button>
      <button class="p-link layout-topbar-button">
        <i class="pi pi-user"></i>
        <span>Profile</span>
      </button>
      <button class="p-link layout-topbar-button" (click)="logout()">
        <i class="pi pi-sign-out"></i>
        <span>Sair</span>
      </button>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="layout-sidebar">
    <p-panelMenu [model]="menuItems" styleClass="w-full" [multiple]="false"></p-panelMenu>
  </div>

  <!-- Main Content -->
  <div class="layout-main-container">
    <div class="layout-main">
      <router-outlet></router-outlet>
    </div>
    <div class="layout-footer">
      <span class="font-medium ml-2">ERP VSD ERP</span>
    </div>
  </div>

  <div class="layout-mask" *ngIf="!isCollapsed" (click)="toggleSidebar()"></div>
</div>
