<div class="layout" [class.collapsed]="isCollapsed">
  <header class="topbar">
    <div class="topbar__left">
      <button class="sidebar__toggle" type="button" aria-label="Toggle menu" (click)="toggleSidebar()">☰</button>
      <span class="topbar__title">ERP Admin</span>
    </div>

    <div class="topbar__right">
      <div class="user-info" (click)="toggleDropdown()">
        <i class="pi pi-user user-icon"></i>
        <span class="user-email">{{ userEmail }}</span>
        <i class="pi pi-chevron-down dropdown-icon"></i>
      </div>

      <div class="dropdown" *ngIf="isDropdownOpen">
        <button class="dropdown__item" (click)="logout()">Sair</button>
        <div class="dropdown__error" *ngIf="logoutError">{{ logoutError }}</div>
      </div>
    </div>
  </header>

  <aside class="sidebar">
    <nav class="sidebar__nav">
      <a class="sidebar__link" routerLink="/admin/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <i class="pi pi-home sidebar__icon"></i>
        <span class="sidebar__text">Home</span>
      </a>
      <a class="sidebar__link" routerLink="/admin/cadastros" routerLinkActive="active">
        <i class="pi pi-folder sidebar__icon"></i>
        <span class="sidebar__text">Cadastros</span>
      </a>
      <a class="sidebar__link" routerLink="/admin/relatorios" routerLinkActive="active">
        <i class="pi pi-chart-bar sidebar__icon"></i>
        <span class="sidebar__text">Relatórios</span>
      </a>
      <a class="sidebar__link" routerLink="/admin/config" routerLinkActive="active">
        <i class="pi pi-cog sidebar__icon"></i>
        <span class="sidebar__text">Configurações</span>
      </a>
    </nav>
  </aside>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>

<footer class="footer">
  <p>&copy; 2026 ERP Admin. Todos os direitos reservados.</p>
</footer>
