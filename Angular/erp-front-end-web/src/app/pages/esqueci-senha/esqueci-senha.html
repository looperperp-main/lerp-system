<app-default-login-layout
  title="Esqueceu"
  titleAccent="a senha?"
  subtitle="Informe o CNPJ e o e-mail da sua conta. Enviaremos um link para você criar uma nova senha."
  primaryBtnText="enviar link"
  secondaryBtnText="Voltar ao login"
  (submit)="submit()"
  (navigate)="voltarLogin()"
  [disablePrimaryBtn]="form.invalid"
>
  @if (enviado) {
    <p style="color:#2e7d32; line-height:1.6;">
      Se os dados estiverem corretos, você receberá um e-mail com o link para redefinir sua senha.
      O link é válido por <strong>7 dias</strong>.
    </p>
    <a routerLink="/login" class="forgot-password">Voltar ao login</a>
  } @else {
    <form [formGroup]="form">
      <app-primary-input
        formControlName="cnpj"
        inputName="cnpj"
        type="text"
        label="CNPJ da Empresa"
        placeholder="00.000.000/0000-00"
        [mask]="'cnpj'"
        [maxLength]="18"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7a7a7a" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
      </app-primary-input>

      <app-primary-input
        formControlName="email"
        inputName="email"
        type="email"
        label="E-mail corporativo"
        placeholder="seu@email.com"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7a7a7a" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
          <polyline points="22,6 12,13 2,6"></polyline>
        </svg>
      </app-primary-input>
    </form>
  }
</app-default-login-layout>
