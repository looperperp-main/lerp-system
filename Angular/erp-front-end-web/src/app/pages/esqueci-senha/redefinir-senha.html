<app-default-login-layout
  title="Criar"
  titleAccent="nova senha."
  subtitle="Escolha uma nova senha forte (mínimo 14 caracteres, com maiúsculas, minúsculas, números e símbolos)."
  primaryBtnText="redefinir senha"
  secondaryBtnText="Voltar ao login"
  (submit)="submit()"
  (navigate)="voltarLogin()"
  [disablePrimaryBtn]="form.invalid || senhasNaoConferem || !token"
>
  @if (concluido) {
    <p style="color:#2e7d32; line-height:1.6;">
      Sua senha foi redefinida com sucesso. Você já pode entrar com a nova senha.
    </p>
    <a routerLink="/login" class="forgot-password">Ir para o login</a>
  } @else {
    <form [formGroup]="form">
      <app-primary-input
        formControlName="novaSenha"
        inputName="novaSenha"
        type="password"
        label="Nova senha"
        placeholder="••••••••••••••"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7a7a7a" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </app-primary-input>

      <app-primary-input
        formControlName="confirmacaoSenha"
        inputName="confirmacaoSenha"
        type="password"
        label="Confirmar nova senha"
        placeholder="••••••••••••••"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7a7a7a" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </app-primary-input>

      @if (senhasNaoConferem) {
        <small style="color:#c00;">As senhas não conferem.</small>
      }
    </form>
  }
</app-default-login-layout>
