<p-toast></p-toast>
<app-default-login-layout
  title="Acesse sua conta"
  primaryBtnText="Entrar"
  secondaryBtnText="Precisa de ajuda?"
  (submit)="submit()"
  (navigate)="navigateToHelp()"
  [disablePrimaryBtn]="!loginForm.valid"
>
  <form [formGroup]="loginForm">
    <app-primary-input
      formControlName="cnpj"
      inputName="cnpj"
      type="text"
      label="CNPJ da Empresa"
      placeholder="00.000.000/0000-00"
      [mask]="'cnpj'"
      [maxLength]="18"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
    </app-primary-input>

    <app-primary-input
      formControlName="email"
      inputName="email"
      type="email"
      label="E-mail"
      placeholder="seu@email.com"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
        <polyline points="22,6 12,13 2,6"></polyline>
      </svg>
    </app-primary-input>

    <app-primary-input
      formControlName="password"
      inputName="password"
      type="password"
      label="Senha"
      placeholder="••••••••"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
    </app-primary-input>
    <div class="form-actions-row">
      <label class="checkbox-container">
        <input type="checkbox" formControlName="rememberMe">
        <span>Lembrar-me</span>
      </label>
      <a href="#" class="forgot-password">Esqueceu sua senha?</a>
    </div>
  </form>
</app-default-login-layout>
