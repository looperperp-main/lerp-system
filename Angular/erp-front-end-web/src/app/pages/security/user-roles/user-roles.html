<div class="card">
  <p-toast></p-toast>

  <div class="page-header">
    <div>
      <h1 class="page-title">Atribuir Acessos</h1>
      <p class="page-subtitle">Defina as roles de cada usuário</p>
    </div>
  </div>

  <div class="content-card">
    <div class="content-toolbar">
      <h3 class="content-toolbar-title">Usuários</h3>
      <div class="content-toolbar-actions">
        <input pInputText type="text" placeholder="Filtrar por nome" [(ngModel)]="filterName" (keydown.enter)="load()" />
        <button pButton pRipple label="Filtrar" icon="pi pi-search" class="p-button-sm" (click)="load()"></button>
      </div>
    </div>

    <div class="table-container">
      <p-table
        [value]="users()"
        [loading]="loading()"
        [lazy]="true"
        (onLazyLoad)="onLazyLoad($event)"
        [totalRecords]="totalRecords()"
        [paginator]="true"
        [rows]="10"
        [rowsPerPageOptions]="[10, 25, 50]"
        [tableStyle]="{ 'min-width': '45rem' }"
        styleClass="p-datatable-sm text-sm">

        <ng-template pTemplate="header">
          <tr>
            <th pSortableColumn="displayName">Nome <p-sortIcon field="displayName"></p-sortIcon></th>
            <th>Email</th>
            <th>Configurar</th>
          </tr>
        </ng-template>

        <ng-template pTemplate="body" let-user>
          <tr>
            <td class="font-medium text-gray-900">{{ user.displayName }}</td>
            <td class="text-gray-600">{{ user.email }}</td>
            <td>
              <button pButton pRipple icon="pi pi-key" label="Acessos" class="p-button-sm p-button-outlined" (click)="openConfig(user)"></button>
            </td>
          </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
          <tr><td colspan="3" class="text-center py-6 text-gray-500">Nenhum usuário encontrado.</td></tr>
        </ng-template>
      </p-table>
    </div>
  </div>

  <p-dialog [(visible)]="dialog" [style]="{ width: '900px', minHeight: '500px' }"
            [header]="'Acessos de: ' + (selectedUser?.displayName || '')" [modal]="true">
    <div class="mt-4">
      <p-pickList
        [source]="source"
        [target]="target"
        sourceHeader="Roles Disponíveis"
        targetHeader="Roles do Usuário"
        [dragdrop]="true"
        [responsive]="true"
        [sourceStyle]="{ height: '350px' }"
        [targetStyle]="{ height: '350px' }"
        filterBy="name"
        sourceFilterPlaceholder="Buscar role..."
        targetFilterPlaceholder="Buscar role...">
        <ng-template let-role pTemplate="item">
          <div class="flex flex-col border-b border-gray-100 py-2">
            <span class="font-bold font-mono text-xs text-indigo-700">{{ role.name }}</span>
          </div>
        </ng-template>
      </p-pickList>
    </div>
    <ng-template pTemplate="footer">
      <button pButton pRipple label="Cancelar" icon="pi pi-times" class="p-button-text" (click)="dialog = false"></button>
      <button pButton pRipple label="Salvar Acessos" icon="pi pi-check" class="p-button-success" [loading]="saving" (click)="save()"></button>
    </ng-template>
  </p-dialog>
</div>
