<div class="page-container">
  <p-toast></p-toast>

  <div class="page-header">
    <div>
      <h1 class="page-title">Associação de Tabelas de Preço</h1>
      <p class="page-subtitle">Crie e gerencie as Associações</p>
    </div>
  </div>

  <div class="content-card rounded-xl p-6 bg-white shadow-sm mt-4">
    <div class="content-toolbar flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
      <h3 class="content-toolbar-title text-xl font-bold text-gray-800 flex items-center gap-2 m-0">
        <i class="pi pi-arrow-circle-right text-gray-700"></i> Ações
      </h3>
      <div class="content-toolbar-actions">
        <app-primary-button
          icon="pi pi-upload"
          padding="0.5rem 0.8rem"
          tooltip="Exportar"
          tooltipPosition="bottom"
          backgroundColor="#f28705"
          (onClick)="exportData()">
        </app-primary-button>
      </div>
    </div>

    <div class="table-container">
      <p-table
        [value]="grupos()"
        [columns]="cols"
        [loading]="loading()"
        [paginator]="true"
        [rows]="size"
        [totalRecords]="totalRecords()"
        [lazy]="true"
        (onLazyLoad)="loadGrupos($event)"
        [showCurrentPageReport]="true" [tableStyle]="{ 'min-width': '60rem' }"
        currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} registros"
        [rowsPerPageOptions]="[10, 25, 50]" [paginatorDropdownAppendTo]="'body'"
        styleClass="p-datatable-sm text-sm">

        <ng-template pTemplate="header" let-columns>
          <tr>
            <th *ngFor="let col of columns" [pSortableColumn]="col.field !== 'actions' ? col.field : ''" class="text-xs uppercase text-gray-400 font-semibold border-b border-gray-100 pb-3">
              {{col.header}} <p-sortIcon *ngIf="col.field !== 'actions'" [field]="col.field"></p-sortIcon>
            </th>
          </tr>
        </ng-template>

        <ng-template pTemplate="body" let-rowData let-columns="columns">
          <tr lass="hover:bg-gray-50 border-b border-gray-50 last:border-0 transition-colors">
            <td *ngFor="let col of columns" class="py-3 text-gray-600">

              <!-- Status -->
              <ng-container *ngIf="col.type === 'status'">
                <span [class]="'px-2 py-1 rounded text-xs font-medium ' +
                    (rowData[col.field] === true ? 'bg-green-100 text-green-700' :
                     'bg-red-100 text-red-700')">
                    {{rowData[col.field] === true ? 'ATIVO' : 'INATIVA'}}
                </span>
              </ng-container>

              <!-- Ações -->
              <ng-container *ngIf="col.type === 'actions'">
                <div class="flex gap-2">
                  <p-button
                    icon="pi pi-tags"
                    pTooltip="Associar Tabelas"
                    tooltipPosition="top"
                    severity="info"
                    [text]="true"
                    [rounded]="true"
                    (onClick)="abrirAssociacao(rowData)">
                  </p-button>
                </div>
              </ng-container>

              <!-- Texto Padrão -->
              <ng-container *ngIf="col.type === 'text'">
                <span class="font-medium" [class.text-gray-900]="col.field === 'id'">
                  {{ rowData[col.field] || '-' | htmlDecode }}
                </span>
              </ng-container>

            </td>
          </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
          <tr>
            <td [attr.colspan]="cols.length" class="text-center py-6 text-gray-500">
              Nenhuma Tabela de Preço encontrada.
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </div>


</div>

<!-- Modal Form (PickList) -->
<app-grupo-cliente-tabela-preco-form
  *ngIf="displayForm"
  [(visible)]="displayForm"
  [grupoClienteId]="selectedGrupoId"
  [grupoClienteNome]="selectedGrupoNome"
  (onSaved)="onFormSaved()">
</app-grupo-cliente-tabela-preco-form>
