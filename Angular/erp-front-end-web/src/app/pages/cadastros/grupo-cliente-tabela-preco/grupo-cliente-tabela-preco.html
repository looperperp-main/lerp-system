<div class="page-container">
  <p-toast></p-toast>

  <div class="page-header">
    <div>
      <h1 class="page-title">Associação de Tabelas de Preço</h1>
      <p class="page-subtitle">Crie e gerencie as Associações</p>
    </div>
  </div>

  <div class="content-card rounded-xl p-6 bg-white shadow-sm mt-4">
    <div class="content-toolbar flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
      <h3 class="content-toolbar-title text-xl font-bold text-gray-800 flex items-center gap-2 m-0">
        <i class="pi pi-arrow-circle-right text-gray-700"></i> Ações
      </h3>
      <div class="content-toolbar-actions">
        <app-primary-button
          icon="pi pi-upload"
          padding="0.5rem 0.8rem"
          tooltip="Exportar"
          tooltipPosition="bottom"
          backgroundColor="#f28705"
          (onClick)="exportData()">
        </app-primary-button>
      </div>
    </div>

    <div class="table-container">
      <p-table
        [value]="grupos()"
        [columns]="cols"
        [loading]="loading()"
        [paginator]="true"
        [rows]="size"
        [totalRecords]="totalRecords()"
        [lazy]="true"
        (onLazyLoad)="loadGrupos($event)"
        [showCurrentPageReport]="true"
        currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} registros"
        [rowsPerPageOptions]="[10, 25, 50]"
        styleClass="p-datatable-sm p-datatable-striped">

        <ng-template pTemplate="header" let-columns>
          <tr>
            <th *ngFor="let col of columns" [pSortableColumn]="col.field !== 'actions' ? col.field : undefined">
              {{col.header}}
            </th>
          </tr>
        </ng-template>

        <ng-template pTemplate="body" let-rowData let-columns="columns">
          <tr>
            <td *ngFor="let col of columns">

              <!-- Status -->
              <ng-container *ngIf="col.type === 'status'">
            <span [class]="rowData[col.field] ? 'text-green-600 font-bold' : 'text-red-600 font-bold'">
              {{ rowData[col.field] ? 'Sim' : 'Não' }}
            </span>
              </ng-container>

              <!-- Ações -->
              <ng-container *ngIf="col.type === 'actions'">
                <div class="flex gap-2">
                  <p-button
                    icon="pi pi-tags"
                    pTooltip="Associar Tabelas"
                    tooltipPosition="top"
                    severity="info"
                    [text]="true"
                    [rounded]="true"
                    (onClick)="abrirAssociacao(rowData)">
                  </p-button>
                </div>
              </ng-container>

              <!-- Texto Padrão -->
              <ng-container *ngIf="col.type === 'text'">
                {{ rowData[col.field] }}
              </ng-container>

            </td>
          </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
          <tr>
            <td [attr.colspan]="cols.length" class="text-center p-4">
              Nenhum grupo de cliente encontrado.
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </div>


</div>

<!-- Modal Form (PickList) -->
<app-grupo-cliente-tabela-preco-form
  *ngIf="displayForm"
  [(visible)]="displayForm"
  [grupoClienteId]="selectedGrupoId"
  [grupoClienteNome]="selectedGrupoNome"
  (onSaved)="onFormSaved()">
</app-grupo-cliente-tabela-preco-form>
