<form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4 mt-2">

  <div class="flex flex-col gap-2">
    <label for="nome" class="font-semibold text-gray-700">Nome <span class="text-red-500">*</span></label>
    <input
      id="nome"
      type="text"
      pInputText
      formControlName="nome"
      class="w-full"
      [ngClass]="{'ng-invalid ng-dirty': isFieldInvalid('nome')}"
      placeholder="Ex: Atacadistas">
    <small *ngIf="isFieldInvalid('nome')" class="text-red-500">O nome é obrigatório.</small>
  </div>

  <div class="flex flex-col gap-2">
    <label for="descricao" class="font-semibold text-gray-700">Descrição</label>
    <textarea
      id="descricao"
      rows="3"
      pInputTextarea
      formControlName="descricao"
      class="w-full"
      placeholder="Detalhes opcionais sobre o grupo..."></textarea>
  </div>

  <div class="flex items-center gap-2 mt-2">
    <p-checkbox
      inputId="ativo"
      formControlName="ativo"
      [binary]="true"></p-checkbox>
    <label for="ativo" class="font-semibold text-gray-700 cursor-pointer">Grupo Ativo</label>
  </div>

  <div class="flex justify-end gap-2 mt-6 pt-4 border-t border-gray-200">
    <p-button
      label="Cancelar"
      icon="pi pi-times"
      styleClass="p-button-text p-button-secondary"
      (onClick)="onCancel()"
      [disabled]="isSaving"></p-button>
    <p-button
      label="Salvar"
      icon="pi pi-check"
      type="submit"
      [loading]="isSaving"
      [disabled]="form.invalid"></p-button>
  </div>
</form>
