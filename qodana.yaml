#-------------------------------------------------------------------------------#
#               Qodana analysis is configured by qodana.yaml file               #
#             https://www.jetbrains.com/help/qodana/qodana-yaml.html            #
#-------------------------------------------------------------------------------#
version: "1.0"

profile:
  name: qodana.starter

include:
  - name: SqlInjection
  - name: VulnerableLibrariesLocal
  - name: HardcodedCredentials
  - name: JavaSerializationObjectInputStream

# Quality gate — fails CI if any critical issue is found, or too many high-severity
failureConditions:
  severityThresholds:
    critical: 0
    high: 10

projectJDK: "25"

linter: jetbrains/qodana-jvm:2025.3