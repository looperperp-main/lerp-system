databaseChangeLog:
  - changeSet:
      id: cad-019-update-table-cond-pagamento
      author: vitor-fernandes
      changes:
        - addColumn:
            schemaName: cadastros
            tableName: condicao_pagamento_parcela
            columns:
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
              - column:
                  name: created_by
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: last_updated_by
                  type: uuid