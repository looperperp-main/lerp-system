databaseChangeLog:
  - changeSet:
      id: billing-011-create-plan
      author: vitor
      changes:
        - createTable:
            schemaName: billing
            tableName: plan
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: plan_type
                  type: varchar(20)
                  constraints:
                    nullable: false
                  remarks: "MENSAL | ANUAL"
              - column:
                  name: billing_cycle
                  type: varchar(20)
                  constraints:
                    nullable: false
                  remarks: "MONTHLY | YEARLY (Asaas cycle)"
              - column:
                  name: value
                  type: numeric(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(500)
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false