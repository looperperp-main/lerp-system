databaseChangeLog:
  - changeSet:
      id: "007-create-webhook-log-table"
      author: vitor fernandes ferreira
      changes:
        - createTable:
            schemaName: billing
            tableName: webhook_log
            remarks: Registro de todos os webhooks recebidos do Asaas — garante idempotência no processamento
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_webhook_log
                    nullable: false

              - column:
                  name: tenant_id
                  type: BIGINT
                  remarks: Pode ser nulo se o tenant ainda não foi identificado

              - column:
                  name: event_type
                  type: VARCHAR(60)
                  remarks: "ex: PAYMENT_RECEIVED, PAYMENT_OVERDUE, SUBSCRIPTION_INACTIVATED"
                  constraints:
                    nullable: false

              - column:
                  name: asaas_payment_id
                  type: VARCHAR(50)
                  remarks: ID do payment no payload do Asaas

              - column:
                  name: asaas_subscription_id
                  type: VARCHAR(50)
                  remarks: ID da subscription no payload, quando presente

              - column:
                  name: payload
                  type: TEXT
                  remarks: JSON completo do webhook para reprocessamento e auditoria
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(20)
                  remarks: "RECEBIDO | PROCESSADO | ERRO | IGNORADO"
                  constraints:
                    nullable: false

              - column:
                  name: error_message
                  type: TEXT
                  remarks: Detalhe do erro caso o processamento falhe

              - column:
                  name: received_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

              - column:
                  name: processed_at
                  type: TIMESTAMP WITH TIME ZONE

        - createIndex:
            schemaName: billing
            tableName: webhook_log
            indexName: idx_webhook_asaas_payment_id
            columns:
              - column:
                  name: asaas_payment_id

        - createIndex:
            schemaName: billing
            tableName: webhook_log
            indexName: idx_webhook_status
            columns:
              - column:
                  name: status

        - createIndex:
            schemaName: billing
            tableName: webhook_log
            indexName: idx_webhook_event_type
            columns:
              - column:
                  name: event_type

      rollback:
        - dropTable:
            schemaName: billing
            tableName: webhook_log
