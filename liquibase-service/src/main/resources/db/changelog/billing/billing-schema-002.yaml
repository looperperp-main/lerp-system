databaseChangeLog:
  - changeSet:
      id: "002-create-partner-table"
      author: vitor fernandes ferreira
      changes:
        - createTable:
            schemaName: billing
            tableName: partner
            remarks: Contadores parceiros do SaaS
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_partner
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(200)
                  constraints:
                    nullable: false

              - column:
                  name: email
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_partner_email

              - column:
                  name: cnpj
                  type: VARCHAR(14)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_partner_cnpj

              - column:
                  name: crc
                  type: VARCHAR(20)
                  remarks: Número do CRC do contador

              - column:
                  name: referral_code
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_partner_referral_code

              - column:
                  name: commission_rate
                  type: NUMERIC(5,2)
                  remarks: "Percentual de comissão ex: 10.00"
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(30)
                  remarks: "PENDENTE | ATIVO | SUSPENSO | INATIVO"
                  constraints:
                    nullable: false

              - column:
                  name: asaas_customer_id
                  type: VARCHAR(50)
                  remarks: ID do cliente no Asaas para repasse de comissão

              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

              - column:
                  name: created_by
                  type: VARCHAR(200)
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE

              - column:
                  name: updated_by
                  type: VARCHAR(200)

      rollback:
        - dropTable:
            schemaName: billing
            tableName: partner
