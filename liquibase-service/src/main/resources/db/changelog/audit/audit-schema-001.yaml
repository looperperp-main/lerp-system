databaseChangeLog:
  - changeSet:
      id: 000-create-audit-schemas
      author: vitor fernandes
      changes:
        # Schema para Auditoria
        - sql:
            sql: CREATE SCHEMA IF NOT EXISTS audit;

  - changeSet:
      id: 001-create-audit-tables
      author: vitor fernandes ferreira
      changes:
        - createTable:
            schemaName: audit
            tableName: audit_log
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: actor_user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: action
                  type: varchar(80)
                  constraints:
                    nullable: false
              - column:
                  name: target_type
                  type: varchar(60)
              - column:
                  name: target_id
                  type: uuid
              - column:
                  name: result
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: details_json
                  type: text
              - column:
                  name: correlation_id
                  type: uuid
              - column:
                  name: eventDate
                  type: timestamp

  - changeSet:
      id: 002-create-consumer_error_log
      author: vitor fernandes ferreira
      changes:
        - createTable:
            schemaName: audit
            tableName: consumer_error_log
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: service_name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: topic
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: error_message
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: payload_json
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: event_id
                  type: uuid



