databaseChangeLog:

  # Garante unicidade do code (invariante de permissão) e habilita o ON CONFLICT do seed.
  # Pré-requisito: não pode haver codes duplicados na tabela. Os dados atuais (TENANT_*, USER_*,
  # PERMISSION_*) são únicos — se algum ambiente tiver duplicado, limpar antes de aplicar.
  - changeSet:
      id: auth-018-permission-code-unique
      author: vitor-fernandes
      changes:
        - addUniqueConstraint:
            schemaName: auth
            tableName: permission
            columnNames: code
            constraintName: uq_permission_code
      rollback:
        - dropUniqueConstraint:
            schemaName: auth
            tableName: permission
            constraintName: uq_permission_code

  # Seed autoritativo das permissões. Idempotente via ON CONFLICT (code) DO NOTHING:
  # em DB novo insere tudo; em DB existente pula o que já está lá (não duplica nem falha).
  # created_date usa o default (CURRENT_TIMESTAMP); created_by = 'system-seed'.
  - changeSet:
      id: auth-019-permission-seed
      author: vitor-fernandes
      changes:
        - sql:
            dbms: postgresql
            splitStatements: false
            sql: >
              INSERT INTO auth.permission (id, code, domain, description, created_by) VALUES
              -- ===== CADASTRO =====
