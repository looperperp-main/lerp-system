databaseChangeLog:
  - changeSet:
      id: 005-permission-table
      author: erp-team
      changes:
        - createTable:
            schemaName: auth
            tableName: permission
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
              - column:
                  name: code
                  type: varchar(120)
                  constraints:
                    nullable: false
              - column:
                  name: domain
                  type: varchar(60)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: created_date
                  type: timestamp
                  defaultValueDate: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: last_update_date
                  type: timestamp
              - column:
                  name: last_update_by
                  type: varchar(200)

  - changeSet:
      id: 006-role-table
      author: erp-team
      changes:
        - createTable:
            schemaName: auth
            tableName: role
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
              - column:
                  name: tenant_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_users_tenant_id
                    referencedTableSchemaName: auth
                    references: auth.tenant(id)
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: created_date
                  type: timestamp
                  defaultValueDate: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: last_update_date
                  type: timestamp
              - column:
                  name: last_update_by
                  type: varchar(200)
        - addUniqueConstraint:
            schemaName: auth
            tableName: role
            columnNames: tenant_id, name
            constraintName: uq_role_name_tenant

  - changeSet:
      id: 007-role-permission-table
      author: erp-team
      changes:
        - createTable:
            schemaName: auth
            tableName: role-permission
            columns:
              - column:
                  name: role_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    foreignKeyName: fk_roles_id
                    referencedTableSchemaName: auth
                    references: auth.role(id)
              - column:
                  name: permission_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_permission_id
                    referencedTableSchemaName: auth
                    references: auth.permission(id)
              - column:
                  name: tenant_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_role_permission_tenant_id
                    referencedTableSchemaName: auth
                    references: auth.tenant(id)



  - changeSet:
      id: 008-user-role-table
      author: erp-team
      changes:
        - createTable:
            schemaName: auth
            tableName: user_role
            columns:
              - column:
                  name: tenant_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_user_role_tenant_id
                    referencedTableSchemaName: auth
                    references: auth.tenant(id)
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_user_role_user_id
                    referencedTableSchemaName: auth
                    references: auth.users_account(id)
              - column:
                  name: role_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_user_role_role_id
                    referencedTableSchemaName: auth
                    references: auth.role(id)
        - addPrimaryKey:
            schemaName: auth
            tableName: user_role
            columnNames: tenant_id, user_id, role_id
            constraintName: pk_user_role

  - changeSet:
      id: 009-user-role-tenant-index
      author: erp-team
      changes:
        - createIndex:
            schemaName: auth
            tableName: user_role
            indexName: idx_user_role_tenant_id
            columns:
              - column:
                  name: tenant_id